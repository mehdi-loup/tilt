name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sidecar:
    name: Sidecar (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # execute.py's wayfinder_paths imports are lazy and the tests stub them,
      # so the test job needs only pytest — not the heavy SDK.
      - run: pip install pytest
      - run: pytest api/wayfinder/tests -q

  web:
    name: Web (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
